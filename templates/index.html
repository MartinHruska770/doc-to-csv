<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Převod Word / PDF do CSV</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="card">
        <h1>Převod do CSV</h1>
        <p class="subtitle">Nahraj dokument Word, PDF nebo TXT a stáhni si text rozdělený po odstavcích jako CSV (id, text).</p>

        {% with messages = get_flashed_messages() %}
          {% for message in messages %}
            <div class="flash">{{ message }}</div>
          {% endfor %}
        {% endwith %}

        <form action="{{ url_for('convert') }}" method="post" enctype="multipart/form-data">
            <label class="dropzone" id="dropzone">
                <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M12 16V4m0 0L8 8m4-4l4 4M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2"/>
                </svg>
                <span id="prompt">Klikni nebo sem přetáhni soubor</span>
                <span class="filename" id="filename"></span>
                <input type="file" name="soubor" id="file-input" accept=".pdf,.docx,.txt" required>
            </label>
            <button type="submit" id="submit" disabled>Převést a stáhnout CSV</button>
        </form>

        <p class="formats">Podporované formáty: PDF, DOCX, TXT · max. 25 MB</p>
    </main>

    <script src="{{ url_for('static', filename='upload.js') }}"></script>
</body>
</html>
